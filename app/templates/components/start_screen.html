<div id="game-container" class="flex flex-col items-center justify-center min-h-full p-6 bg-black">
    <div class="text-center max-w-sm">
        <h1 class="text-5xl font-bold text-red-300 mb-2 glow-text">Soc Ops</h1>
        <p class="text-lg text-red-200 mb-8 tracking-widest">Social Bingo</p>

        <div class="bg-panel border border-red-900 rounded-2xl p-6 shadow-xl mb-8">
            <h2 class="font-semibold text-red-300 mb-3">How to play</h2>
            <ul class="text-left text-red-200 text-sm space-y-2">
                <li>• Find people who match the questions</li>
                <li>• Tap a square when you find a match</li>
                <li>• Get 5 in a row to win!</li>
            </ul>
        </div>

        <button
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="w-full neon-button text-white font-semibold py-4 px-8 rounded-2xl">
            Start Game
        </button>
    </div>
</div>
</div>
