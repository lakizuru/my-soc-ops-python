<div class="grid grid-cols-5 gap-1 w-full max-w-md mx-auto aspect-square">
    {% for square in session.board %}
    {% set is_winning = square.id in session.winning_square_ids %}
    <button
        {% if not square.is_free_space %}
        hx-post="/toggle/{{ square.id }}"
        hx-target="#game-container"
        hx-swap="outerHTML"
        {% endif %}
        {% if square.is_free_space %}disabled{% endif %}
        class="relative flex items-center justify-center p-1 text-center border rounded-2xl transition-all duration-150 select-none min-h-[60px] text-xs leading-tight bg-board border-red-800 text-red-100
        {%- if square.is_marked %}
            {%- if is_winning %} bg-board-win border-red-300 text-red-100
            {%- else %} bg-board-marked border-red-600 text-red-100
            {%- endif %}
        {%- else %} hover:bg-red-950 active:bg-red-900
        {%- endif %}
        {%- if square.is_free_space %} font-bold text-sm text-red-200{% endif %}"
        aria-pressed="{{ 'true' if square.is_marked else 'false' }}"
        aria-label="{{ 'Free space' if square.is_free_space else square.text }}">
        <span class="wrap-break-word hyphens-auto">{{ square.text }}</span>
        {% if square.is_marked and not square.is_free_space %}
        <span class="absolute top-0.5 right-0.5 text-red-300 text-xs">✓</span>
        {% endif %}
    </button>
    {% endfor %}
</div>
