<div id="game-container">
<div class="flex flex-col min-h-full bg-black">
    <!-- Header -->
    <header class="flex items-center justify-between p-3 bg-black border-b border-red-900">
        <button
            hx-post="/reset"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="text-red-300 text-sm px-3 py-1.5 rounded-2xl border border-red-700 hover:bg-red-900 transition-colors">
            ← Back
        </button>
        <h1 class="font-bold text-red-300 tracking-widest">Soc Ops</h1>
        <div class="w-16"></div>
    </header>

    <!-- Instructions -->
    <p class="text-center text-red-200 text-sm py-2 px-4">
        Tap a square when you find someone who matches it.
    </p>

    <!-- Bingo indicator -->
    {% if session.has_bingo %}
    <div class="bg-red-900 text-red-200 text-center py-2 font-semibold text-sm">
        🎉 BINGO! You got a line!
    </div>
    {% endif %}

    <!-- Board -->
    <div class="flex-1 flex items-center justify-center p-3">
        {% include "components/bingo_board.html" %}
    </div>
</div>

{% if session.show_bingo_modal %}
    {% include "components/bingo_modal.html" %}
{% endif %}
</div>
